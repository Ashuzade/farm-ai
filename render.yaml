services:
  - type: web
    name: farmai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WEATHER_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./farmai.db
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        value: "farmai-super-secret-key-2024-change-in-production"