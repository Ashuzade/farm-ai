services:
  - type: web
    name: farmai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WEATHER_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./farmai.db
      - key: ALLOWED_ORIGINS
        value: "*"